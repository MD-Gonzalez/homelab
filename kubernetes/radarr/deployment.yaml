apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
      - name: radarr
        image: lscr.io/linuxserver/radarr:latest
        ports:
        - containerPort: 7878
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/Argentina/Buenos_Aires"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: movies
          mountPath: /movies
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        hostPath:
          path: /var/lib/k8s/radarr
      - name: movies
        hostPath:
          path: /media/movies
      - name: downloads
        hostPath:
          path: /media/downloads
