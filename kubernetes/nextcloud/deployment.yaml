apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      containers:
      - name: nextcloud
        image: nextcloud:28-apache
        ports:
        - containerPort: 80
        env:
        - name: POSTGRES_HOST
          value: nextcloud-postgres.homelab.svc.cluster.local
        - name: POSTGRES_DB
          value: nextcloud
        - name: POSTGRES_USER
          value: nextcloud
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-credentials
              key: db-password
        - name: NEXTCLOUD_ADMIN_USER
          value: Nuuvv
        - name: NEXTCLOUD_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-credentials
              key: admin-password
        - name: NEXTCLOUD_TRUSTED_DOMAINS
          value: "cloud.sigilos.st"
        - name: TZ
          value: "America/Argentina/Buenos_Aires"
        volumeMounts:
        - name: data
          mountPath: /var/www/html
      volumes:
      - name: data
        hostPath:
          path: /data/nextcloud
