apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-postgres
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-postgres
  template:
    metadata:
      labels:
        app: immich-postgres
    spec:
      containers:
      - name: postgres
        image: tensorchord/pgvecto-rs:pg14-v0.2.0
        env:
        - name: POSTGRES_DB
          value: immich
        - name: POSTGRES_USER
          value: immich
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-credentials
              key: db-password
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        hostPath:
          path: /var/lib/k8s/immich-db
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgres
  namespace: homelab
spec:
  selector:
    app: immich-postgres
  ports:
  - port: 5432
    targetPort: 5432
