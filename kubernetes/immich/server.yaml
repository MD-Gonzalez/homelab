apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
      - name: immich-server
        image: ghcr.io/immich-app/immich-server:release
        ports:
        - containerPort: 2283
        env:
        - name: DB_HOSTNAME
          value: immich-postgres.homelab.svc.cluster.local
        - name: DB_DATABASE_NAME
          value: immich
        - name: DB_USERNAME
          value: immich
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-credentials
              key: db-password
        - name: REDIS_HOSTNAME
          value: immich-redis.homelab.svc.cluster.local
        - name: TZ
          value: "America/Argentina/Buenos_Aires"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: "http://immich-ml.homelab.svc.cluster.local:3003"
        volumeMounts:
        - name: upload
          mountPath: /usr/src/app/upload
      volumes:
      - name: upload
        hostPath:
          path: /data/immich
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: homelab
spec:
  selector:
    app: immich-server
  ports:
  - port: 2283
    targetPort: 2283
