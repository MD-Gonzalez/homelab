apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
      - name: bazarr
        image: lscr.io/linuxserver/bazarr:latest
        ports:
        - containerPort: 6767
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "America/Argentina/Buenos_Aires"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: movies
          mountPath: /movies
        - name: tv
          mountPath: /tv
        - name: anime
          mountPath: /anime
      volumes:
      - name: config
        hostPath:
          path: /var/lib/k8s/bazarr
      - name: movies
        hostPath:
          path: /media/movies
      - name: tv
        hostPath:
          path: /media/tv
      - name: anime
        hostPath:
          path: /media/anime
