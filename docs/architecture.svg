<svg width="100%" viewBox="0 0 680 980" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Homelab infrastructure architecture diagram</title>
<desc>Network diagram showing internet flowing through AWS EC2 primary and Vultr standby WireGuard endpoints to an OpenBSD router, then to a NixOS k3s cluster and Proxmox server on the LAN, with client machines below.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a2e; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #3a3a5c; }
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }
  </style>
</defs>

<!-- Legend -->
<g class="c-blue"><rect x="40" y="16" width="10" height="10" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="56" y="21" dominant-baseline="central">Network</text>
<g class="c-teal"><rect x="130" y="16" width="10" height="10" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="146" y="21" dominant-baseline="central">Compute</text>
<g class="c-purple"><rect x="220" y="16" width="10" height="10" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="236" y="21" dominant-baseline="central">Services</text>
<g class="c-gray"><rect x="310" y="16" width="10" height="10" rx="2" stroke-width="0.5"/></g>
<text class="ts" x="326" y="21" dominant-baseline="central">Storage / clients</text>

<!-- Internet -->
<g class="c-gray">
  <rect x="230" y="44" width="220" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="64" text-anchor="middle" dominant-baseline="central">Internet</text>
</g>

<line x1="300" y1="84" x2="200" y2="118" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="380" y1="84" x2="480" y2="118" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- AWS EC2 -->
<g class="c-blue">
  <rect x="60" y="118" width="240" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="136" text-anchor="middle" dominant-baseline="central">AWS EC2 — primary</text>
  <text class="ts" x="180" y="154" text-anchor="middle" dominant-baseline="central">Debian · WireGuard · IAM role</text>
</g>

<!-- Vultr VPS -->
<g class="c-blue">
  <rect x="380" y="118" width="240" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="500" y="136" text-anchor="middle" dominant-baseline="central">Vultr VPS — standby</text>
  <text class="ts" x="500" y="154" text-anchor="middle" dominant-baseline="central">OpenBSD · WireGuard · pf</text>
</g>
<line x1="300" y1="144" x2="380" y2="144" stroke="#888" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
<text class="ts" x="340" y="138" text-anchor="middle">auto-failover</text>

<line x1="180" y1="170" x2="270" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="500" y1="170" x2="410" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- Router -->
<g class="c-blue">
  <rect x="160" y="218" width="360" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="236" text-anchor="middle" dominant-baseline="central">OpenBSD router — 10.0.0.1</text>
  <text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">pf · NAT · Unbound DNS · failover script</text>
</g>

<!-- LAN bar -->
<text class="ts" x="340" y="288" text-anchor="middle" dominant-baseline="central">LAN 10.0.0.0/24</text>
<line x1="60" y1="296" x2="620" y2="296" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="200" y1="296" x2="200" y2="326" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<line x1="500" y1="296" x2="500" y2="326" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Homelab container -->
<g class="c-purple">
  <rect x="60" y="326" width="340" height="400" rx="12" stroke-width="0.5"/>
  <text class="th" x="230" y="350" text-anchor="middle" dominant-baseline="central">Homelab — NixOS · 10.0.0.50</text>
  <text class="ts" x="230" y="367" text-anchor="middle" dominant-baseline="central">k3s single-node cluster</text>
</g>

<g class="c-blue">
  <rect x="78" y="378" width="304" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="392" text-anchor="middle" dominant-baseline="central">nginx · MetalLB · 10.0.0.210</text>
  <text class="ts" x="230" y="407" text-anchor="middle" dominant-baseline="central">TLS · cert-manager · Sealed Secrets</text>
</g>

<g class="c-blue">
  <rect x="78" y="424" width="304" height="30" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="439" text-anchor="middle" dominant-baseline="central">ArgoCD — GitOps · manual sync</text>
</g>

<g class="c-purple">
  <rect x="78" y="464" width="144" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="150" y="482" text-anchor="middle" dominant-baseline="central">Media stack</text>
  <text class="ts" x="150" y="498" text-anchor="middle" dominant-baseline="central">12 services</text>
</g>
<g class="c-purple">
  <rect x="238" y="464" width="144" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="310" y="482" text-anchor="middle" dominant-baseline="central">Productivity</text>
  <text class="ts" x="310" y="498" text-anchor="middle" dominant-baseline="central">4 services</text>
</g>

<g class="c-purple">
  <rect x="78" y="518" width="304" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="536" text-anchor="middle" dominant-baseline="central">Infrastructure</text>
  <text class="ts" x="230" y="552" text-anchor="middle" dominant-baseline="central">Monitoring · Backups · Notifications</text>
</g>

<g class="c-gray">
  <rect x="78" y="572" width="304" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="586" text-anchor="middle" dominant-baseline="central">Storage</text>
  <text class="ts" x="230" y="601" text-anchor="middle" dominant-baseline="central">SSD /k8s · HDD /data · HDD /media</text>
</g>

<!-- S3 offsite -->
<line x1="230" y1="726" x2="230" y2="760" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)" fill="none"/>
<g class="c-blue">
  <rect x="130" y="760" width="200" height="36" rx="6" stroke-width="0.5"/>
  <text class="th" x="230" y="774" text-anchor="middle" dominant-baseline="central">AWS S3</text>
  <text class="ts" x="230" y="789" text-anchor="middle" dominant-baseline="central">Velero offsite backups</text>
</g>

<!-- Proxmox container -->
<g class="c-teal">
  <rect x="420" y="326" width="200" height="230" rx="12" stroke-width="0.5"/>
  <text class="th" x="520" y="350" text-anchor="middle" dominant-baseline="central">Proxmox — 10.0.0.60</text>
  <text class="ts" x="520" y="367" text-anchor="middle" dominant-baseline="central">GPU passthrough · VFIO</text>
</g>
<g class="c-teal">
  <rect x="436" y="378" width="168" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="396" text-anchor="middle" dominant-baseline="central">NixOS HTB VM</text>
  <text class="ts" x="520" y="412" text-anchor="middle" dominant-baseline="central">GTX 1070 · Hashcat</text>
</g>
<g class="c-teal">
  <rect x="436" y="440" width="168" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="520" y="458" text-anchor="middle" dominant-baseline="central">Windows VM</text>
  <text class="ts" x="520" y="474" text-anchor="middle" dominant-baseline="central">Sunshine/Moonlight</text>
</g>
<text class="ts" x="520" y="508" text-anchor="middle" dominant-baseline="central">GPU: one VM at a time</text>

<!-- Clients -->
<text class="ts" x="340" y="862" text-anchor="middle" dominant-baseline="central">WireGuard clients — phones, laptop when remote</text>
<g class="c-gray">
  <rect x="60" y="876" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="125" y="894" text-anchor="middle" dominant-baseline="central">Nix desktop</text>
  <text class="ts" x="125" y="910" text-anchor="middle" dominant-baseline="central">10.0.0.102</text>
</g>
<g class="c-gray">
  <rect x="490" y="876" width="130" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="555" y="894" text-anchor="middle" dominant-baseline="central">LL-Nix laptop</text>
  <text class="ts" x="555" y="910" text-anchor="middle" dominant-baseline="central">NixOS · AMD+NVIDIA</text>
</g>

<!-- Client arrows outside all boxes -->
<line x1="44" y1="296" x2="44" y2="898" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="44" y1="898" x2="60" y2="898" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="636" y1="296" x2="636" y2="898" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="636" y1="898" x2="620" y2="898" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
